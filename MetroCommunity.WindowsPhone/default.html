<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Metro Community</title>

    <!-- WinJS references -->
    <!-- At runtime, ui-themed.css resolves to ui-themed.light.css or ui-themed.dark.css 
    based on the user’s theme setting. This is part of the MRT resource loading functionality. -->
    <link href="/css/ui-themed.css" rel="stylesheet" />
    <script src="//Microsoft.Phone.WinJS.2.1/js/base.js"></script>
    <script src="//Microsoft.Phone.WinJS.2.1/js/ui.js"></script>

    <!-- MetroCommunity.Phone references -->
    <link href="/css/default.css" rel="stylesheet" />
    <script src="/js/default.js"></script>
</head>
<body class="phone">
    <div id="appBar" data-win-control="WinJS.UI.AppBar">
        <button data-win-control="WinJS.UI.AppBarCommand"
                data-win-options="{id:'btnAbout', label:'Про сайт', icon:'info', section:'global'}"></button>
    </div>

    <div id="storeMenu" data-win-control="WinJS.UI.ListView" 
     data-win-options="{layout: {type: WinJS.UI.ListLayout}}">
    </div>
</body>
</html>
